    // Fetch both JSON files
    async function loadData() {
      const response = await fetch("https://raw.githubusercontent.com/zaisei-kakushin-kai/contents/refs/heads/main/data/kessan_card/r5_kessan_data.csv").then(e => e.text())
      const rowsWithHeader = response.split("\n")
      header = rowsWithHeader[0].split(",")
      allData = rowsWithHeader.splice(1).map((e, idx) => {
        const m = {}
        const list = e.split(",")

        header.forEach((key, idx) => {
          let value = list[idx]
          if (value === 'true') {
            value = true
          } else if (value === 'false') {
            value = false
          }

          Object.assign(m, { [key]: value })
        })

        const cardItem = buildCardItem(m, idx)
        Object.assign(m, { cardItem })

        if (!itemByPerf[cardItem.pref]) {
          itemByPerf[cardItem.pref] = []
        }
        itemByPerf[cardItem.pref].push(cardItem)

        return m
      })

      allData.sort((a, b) => {
        parseInt(a['都道府県コード']) > parseInt(b['都道府県コード'])
      })

      renderCards(allData);

      // query parameter ?search-text= があれば検索を復元
      const params = new URLSearchParams(window.location.search);
      const searchText = params.get("search-text");
      if (searchText) {
        document.getElementById("cb-search").value = searchText;
        filterCards();
      }

      // query parameter ?code= があれば自動選択、なければ tab= に従う
      const code = params.get("code");
      if (code) {
        const idx = allData.findIndex((d) => String(d["団体コード"]) === code);
        if (idx !== -1) {
          selectEntity(idx);
        } else {
          showCardBrowser();
        }
      } else {
        const tabParam = params.get("tab");
        switchTab(tabId);
      }
    }

    // table base
    function createTableFunc(title, prefix, col1, col2, d, unitOveride) {
      const set = new Set()
      const rows = header.map(e => {
        if (!e.startsWith(prefix)) {
          return
        }

        const list = e.split(".")
        const coreList = list.slice(1, list.length - 1)

        const core = coreList.join(".")
        if (set.has(core)) {
          return
        }

        set.add(core)

        const name = list[list.length - 2]
        const col1val = [prefix, core, col1].join(".")
        const col2val = [prefix, core, col2].join(".")
        return { name, col1val: d[col1val], col2val: d[col2val], depth: list.length - 3, isTotal: name.includes('合計') }
      }).filter(e => e)

      return {
        title,
        unit: '千円',
        header: [
          { name: '項目', key: 'name' },
          { name: col1, key: 'col1val' },
          { name: col2, key: 'col2val' },
        ],
        rows: rows.slice(0, rows.length - 2),
        footerRow: rows[rows.length - 1]
      }
    }

    function compareYear5andYear4(prefixes, title, d) {
      function showDelta(prefix, name, core, depth) {

        const year4 = `${prefix}.${core}.令和4年度`
        return {
          name,
          year5,
          year4,
          changeDiff: parseFloat(d[year5] / d[year4]).toFixed(2),
          depth
        }
      }

      const set = new Set()
      return {
        title,
        unit: '千円',
        header: [
          { name: '項目', key: 'name' },
          { name: '令和5年度', key: 'year5' },
          { name: '令和4年度', key: 'year4' },
          { name: '増減率', key: 'changeDiff' }
        ],
        rows: header.filter(e => {
          if (!prefixes.every(prefix => prefix.startsWith(e))) {
            return
          }

          const list = e.split(".").slice(0, list.length - 2)
          const prefix_ = list[0]
          const core = list.join(".")
          if (set.has(core)) {
            return
          }

          set.add(core)

          const cat = list[list.length - 1]
          const name = cat.slice(0, cat.indexOf('_'))
          return showDelta(prefix_, name, core, list.length - 3)
        }).filter(e => e)
      }
    }

    // ══════════════════════════════════════════════
    // CARD BROWSER
    // ══════════════════════════════════════════════
    function buildCardItem(d, idx) {
      const pop = d["人口.住民基本台帳人口.令6_1_1"];
      const density = d["人口密度_人_per_km2"];
      const area = d["面積_km2"];
      const revenue = d["歳入の状況_千円.歳入合計.決算額"];
      const localTax = d["市町村税の状況_千円.普通税.合計.収入済額"];
      return {
        idx,
        name: d["団体名"] || "N/A",
        badge: d["市町村類型"] || "N/A",
        pref: d["都道府県名"] || "N/A",
        rows: [
          { label: "人口", value: pop ? Number(pop).toLocaleString() + " 人" : "-" },
          { label: "人口密度", value: density ? density + " 人/km²" : "-" },
          { label: "面積", value: area ? area + " km²" : "-" },
          { label: "歳入合計", value: revenue ? fmtOku(Number(revenue)) : "-" },
          { label: "市町村税合計", value: localTax ? fmtOku(Number(localTax)) : "-" },
        ],
      };
    }

    function renderCards() {
      const cardHtml = d => `
        <div id="card-${d.idx}" class="entity-card" onclick="selectEntity(${d.idx})">
          <div class="ec-badge">${d.badge}</div>
          <h2>${d.name}</h2>
          <div class="ec-stats">
            ${d.rows.map(r => `<div class="ec-row"><span class="ec-label">${r.label}</span><span class="ec-value">${r.value}</span></div>`).join("")}
          </div>
        </div>`;

      const grid = document.getElementById("entity-grid");
      grid.innerHTML = "";
      const keys = Object.keys(itemByPerf);
      let i = 0;

      function renderChunk() {
        const end = Math.min(i + 3, keys.length);
        const frag = document.createDocumentFragment();
        for (; i < end; i++) {
          const key = keys[i];
          const div = document.createElement("div");
          div.id = `ec-group-${key}`;
          div.className = "ec-group";
          div.innerHTML = `<div class="ec-group-label">${key}</div><div class="ec-group-cards">${itemByPerf[key].map(cardHtml).join("")}</div>`;
          frag.appendChild(div);
        }
        grid.appendChild(frag);
        if (i < keys.length) requestAnimationFrame(renderChunk);
      }

      requestAnimationFrame(renderChunk);
    }

    let _filterTimer;
    function filterCards() {
      clearTimeout(_filterTimer);
      _filterTimer = setTimeout(() => {
        const q = document.getElementById("cb-search").value.trim();

        // URL に反映
        const url = new URL(window.location);
        if (q) {
          url.searchParams.set("search-text", q);
        } else {
          url.searchParams.delete("search-text");
        }
        history.replaceState(null, "", url);

        // カード表示/非表示
        let count = 0;
        for (const key in itemByPerf) {
          let groupVisible = false;
          itemByPerf[key].forEach(item => {
            const match = !q || item.name.includes(q) || item.pref.includes(q);
            const el = document.getElementById(`card-${item.idx}`);
            if (el) el.style.display = match ? "" : "none";
            if (match) { groupVisible = true; count++; }
          });
          const g = document.getElementById(`ec-group-${key}`);
          if (g) g.style.display = groupVisible ? "" : "none";
        }

        document.getElementById("cb-count").textContent = q ? `${count} 件` : "";
      }, 50);
    }

    // ══════════════════════════════════════════════

    // ══════════════════════════════════════════════
    function switchTab(id) {
      document.querySelectorAll(".tab-panel").forEach(p => p.style.display = 'none');
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      document.getElementById(`tab-${id}`).style.display = 'flex';
      document.querySelectorAll(".tab-btn").forEach(b => {
        if (b.getAttribute("onclick") === `switchTab('${id}')`) b.classList.add("active");
      });

      const url = new URL(window.location);
      url.searchParams.set("tab", id);
      history.pushState(null, "", url);

      if (id === 'search') {
        // グリッドを一時的に取り外し、空のタブを即座に表示してから
        // グループを少しずつ再アタッチしてブラウザのレイアウトコストを分散する
        const grid = document.getElementById('entity-grid');
        const groups = Array.from(grid.children);
        grid.innerHTML = '';
        let i = 0;
        function attachChunk() {
          const end = Math.min(i + 3, groups.length);
          const frag = document.createDocumentFragment();
          for (; i < end; i++) frag.appendChild(groups[i]);
          grid.appendChild(frag);
          if (i < groups.length) requestAnimationFrame(attachChunk);
        }
        requestAnimationFrame(attachChunk);
      }
    }

    function buildList(data) {
      const container = document.getElementById("entity-list");
      container.innerHTML = "";

      // group by pref
      const groups = {};
      data.forEach((d, i) => {
        const p = d["都道府県名"];
        if (!groups[p]) groups[p] = [];
        groups[p].push({ data: d, idx: allData.indexOf(d) });
      });

        const g = document.createElement("div");
        g.className = "pref-group";

        const label = document.createElement("div");
        label.className = "pref-label";
        label.innerHTML = `<span>◆ ${pref}</span><span class="toggle-icon">▼</span>`;
        label.addEventListener("click", () =>
          g.classList.toggle("collapsed"),

        g.appendChild(label);

        items.forEach(({ data: d, idx }) => {
          const pop = d["人口"]?.["住民基本台帳人口"]?.["令6_1_1"];
          const popStr = pop ? (pop / 10000).toFixed(1) + "万" : "-";

          const item = document.createElement("div");
          item.className = "entity-item";
          item.dataset.idx = idx;
          item.innerHTML = `
        <span class="name">${d["団体名"]}</span>
        <span class="pop">${popStr}</span>
      `;
          item.addEventListener("click", () => selectEntity(idx));
          g.appendChild(item);
        });

        container.appendChild(g);
      });

    // UTILITIES
    // ══════════════════════════════════════════════
    function fmt(v) {
      if (v === "-" || v === null || v === undefined) return "-";
      if (typeof v === "number") return v.toLocaleString();
      return v;
    }
    function fmtOku(v) {
      if (v === "-" || v === null || v === undefined) return "-";
      if (typeof v === "number") return (v / 100000).toFixed(1) + "億円";
      return v;
    }
    function numVal(v) {
      if (typeof v === "number") return v;
      return null;
    }

    /**
     * renderDelta(cur, prev, unit)
     *   cur, prev : number | null
     *   unit      : string  例) "人", "千円", "%"
     *   戻り値    : delta UI の HTML 文字列（kpi-valueの下に添える）
     *
     *   表示例:  ▲ +1,234人 (+2.1%)  /  ▼ −567人 (−0.3%)  /  — 変化なし
     */
    function renderDelta(cur, prev, unit = "", prevLabel = "前年") {
      if (cur === null || prev === null) return "";
      const diff = cur - prev;
      const dir = diff > 0 ? "up" : diff < 0 ? "down" : "flat";
      const arrow = diff > 0 ? "▲" : diff < 0 ? "▼" : "—";
      const sign = diff > 0 ? "+" : diff < 0 ? "−" : "";
      const absDiff = Math.abs(diff);
      const pct = prev !== 0 ? (absDiff / Math.abs(prev) * 100).toFixed(1) : null;
      const pctStr = pct !== null ? ` (${sign}${pct}%)` : "";
      const diffStr = diff !== 0
        ? `<div class="kpi-delta ${dir}">${arrow} ${sign}${absDiff.toLocaleString()}${unit}<br><span style="padding-left:1em;opacity:0.85">(${sign}${pct}%)</span></div>`
        : `<div class="kpi-delta flat">— 変化なし</div>`;
      return `<div class="kpi-prev"><span class="kpi-prev-label">${prevLabel}&nbsp;</span><span class="kpi-prev-val">${prev.toLocaleString()}${unit}</span></div>${diffStr}`;
    }

    function renderBooleanData({ title, items }) {
      const cells = items.map(({ label, value }) => {
        const s = value ? "on" : "off";
        return `<div class="bool-item"><div class="bool-dot ${s}"></div><span class="bool-label ${s}">${label}</span></div>`;
      }).join("");
      return `<div class="card"><div class="card-header">${title}</div><div class="bool-grid">${cells}</div></div>`;
    }

    function renderTableData({ id, title, unit, header, rows, footerRow }) {
      const thCells = header.map((c) => `<th>${c.name}</th>`).join("");
      const footerHtml = footerRow
        ? `<tfoot><tr class="total-row">${header.map((h) => `<td>${footerRow[h.key]}</td>`).join("")}</tr></tfoot>`
        : "";
      const bodyRows = rows.slice(0, rows.length - 1).map((row) => {
        const indentPx = row.depth === 1 ? "1.8em" : row.depth === 2 ? "3.2em" : "0";
        const trClass = row.isTotal ? ` class="total-row"` : "";
        const tdCells = header.map((header, i) => {
          const cell = row[header.key]
          const styles = [];
          if (i === 0 && row.depth > 0) styles.push(`padding-left:${indentPx}`, "color:var(--white)");
          if (row.dim && i === 0 && row.depth === 0) styles.push("color:var(--white)");
          if (i > 0) styles.push("text-align:right");
          if (row.highlight && i === row.highlightCol) styles.push("color:var(--orange)");
          const style = styles.length ? ` style="${styles.join(";")}"` : "";
          return `<td${style}>${cell}</td>`;
        }).join("\n");
        return `<tr${trClass}>${tdCells}</tr>`;
      }).join("\n");
      return `
          <div id="card-table-${id}" class="card">
            <div class="card-header">${title}<span class="badge">${unit}</span></div>
            <div class="card-body" style="overflow-y:auto;max-height:400px;">
              <table class="data-table">
                <thead>
                  <tr>
                    ${thCells}
                  </tr>
                </thead>
                <tbody>
                  ${bodyRows}
                </tbody>
                ${footerHtml}
              </table>
            </div>
          </div>
      `
    }

    function renderTable({ columns, rows, footer }) {
      const thCells = columns.map((c) => `<th>${c}</th>`).join("");
      const bodyRows = rows.map((row) => {
        const indentPx = row.indent === 1 ? "1.8em" : row.indent === 2 ? "3.2em" : "0";
        const opacity = "";
        const trStyle = "";
        const trClass = row.isTotal ? `class="total-row"` : "";
        const tdCells = row.cells.map((cell, i) => {
          const styles = [];

          if (i === 0 && row.indent > 0) styles.push(`padding-left:${indentPx}`, "color:var(--white)");
          if (row.dim && i === 0 && row.indent === 0) styles.push("color:var(--white)");
          if (i > 0) styles.push("text-align:right");
          if (row.highlight && i === row.highlightCol) styles.push("color:var(--orange)");
          const style = styles.length ? ` style="${styles.join(";")}"` : "";

          return `<td${style}>${cell}</td>`;
        }).join("");

        return `<tr${trClass}>${tdCells}</tr>`;

      }).join("");
      const footerHtml = footer
        ? `<tfoot><tr class="total-row">${footer.map((c) => `<td>${c}</td>`).join("")}</tr></tfoot>`
        : "";
      return `<table class="data-table"><thead><tr>${thCells}</tr></thead><tbody>${bodyRows}</tbody>${footerHtml}</table>`;
    }

    // ══════════════════════════════════════════════
    // RENDER
    // ══════════════════════════════════════════════
    function renderDetail(d, container) {
      Object.values(chartInstances).forEach((c) => c.destroy());
      chartInstances = {};

      const pop = d["人口"]?.["住民基本台帳人口"]?.["令6_1_1"];
      const pop5 = d["人口"]?.["住民基本台帳人口"]?.["令5_1_1"];
      const area = d["面積_km2"];
      const density = d["人口密度_人_per_km2"];
      const sai = d["歳入の状況_千円"];
      const zaiTotal = sai?.["歳入合計"]?.["決算額"];
      const shitei = d["指定団体等の指定状況"] || {};

      // ── 指定団体LEDグリッド
      const shiteiCells = Object.entries(shitei).map(([label, active]) => `
          <div style="background:var(--bg-primary);padding:7px 10px;display:flex;align-items:center;gap:7px">
            <div style="width:7px;height:7px;border-radius:50%;flex-shrink:0;${active
          ? 'background:var(--orange);box-shadow:0 0 6px var(--orange),0 0 12px #fb8b1e44'
          : 'background:var(--gray-dim)'}"></div>
            <span style="font-size:11px;letter-spacing:0.5px;color:${active ? 'var(--white)' : 'var(--gray-dim)'}">${label}</span>
          </div>`).join("");

      let html = `
    <div id="card-summary" class="card">
      <div class="card-body">
        <div id="entity-header">
          <div>
            <div id="entity-name">${d["都道府県名"]} ${d["団体名"]}</div>
            <div id="entity-pref">団体コード ${d["団体コード"]}</div>
          </div>
          <div id="entity-year">${d["年度"]}<br><span style="color:var(--gray);font-size:10px">決算確定</span></div>
        </div>
        <div class="sep"></div>
        <div id="kpi-grid" class="kpi-grid">
          <div class="kpi-cell"><div class="kpi-label">住民基本台帳人口 <span style="opacity:0.6;font-size:9px">令6.1.1</span></div><div class="kpi-value">${fmt(pop)}<span class="kpi-unit">人</span></div>${renderDelta(numVal(pop), numVal(pop5), "人", "令5.1.1")}</div>
          <div class="kpi-cell"><div class="kpi-label">面積</div><div class="kpi-value">${fmt(area)}<span class="kpi-unit">km²</span></div></div>
          <div class="kpi-cell"><div class="kpi-label">人口密度</div><div class="kpi-value">${fmt(density)}<span class="kpi-unit">人/km²</span></div></div>
          <div class="kpi-cell"><div class="kpi-label">歳入合計</div><div class="kpi-value" style="color:var(--orange-bright)">${fmtOku(zaiTotal)}</div></div>
          <div class="kpi-cell"><div class="kpi-label">地方税</div><div class="kpi-value">${fmtOku(numVal(sai?.["地方税"]?.["決算額"]))}</div></div>
          <div class="kpi-cell"><div class="kpi-label">地方交付税</div><div class="kpi-value">${fmtOku(numVal(sai?.["地方交付税"]?.["決算額"]))}</div></div>
          <div class="kpi-cell">
            <div class="kpi-label">地方債現在高 <span style="opacity:0.6;font-size:9px">令和5年度</span></div>
            <div class="kpi-value">${fmtOku(numVal(d["地方債現在高_千円"]?.["令和5年度"]))}</div>
            ${renderDelta(numVal(d["地方債現在高_千円"]?.["令和5年度"]), numVal(d["地方債現在高_千円"]?.["令和4年度"]), "千円", "令和4年度")}
          </div>
        </div>
        ${Object.keys(shitei).length ? `
        <div class="sep"></div>
        <div style="font-size:10px;color:var(--gray);font-family:var(--font-mono);letter-spacing:1px;padding:5px 10px;border-bottom:1px solid var(--border)">指定団体等の指定状況</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:1px;background:var(--border)">${shiteiCells}</div>
        ` : ""}
      </div>
    </div>
  `;

      html += `
        <div class="charts-row">  
          ${renderBooleanData(shiteiDantaiCheck(d))}
          ${renderBooleanData(ichiBuJimuCheck(d))}
        </div>   
      `

      // 歳入の状況: chart-sainyu
      // 市町村税の状況: chart-sainyu
      const chartSainyuFunc = () => renderPieChart('chart-sainyuu')
      const chartZeiFunc = () => renderPieChart('chart-zei')
      html += `
    <div id="row-charts" class="charts-row">
      <div id="card-chart-sainyuu" class="card">
        <div class="card-header">歳入の状況</div>
        <div class="card-body"><div class="chart-wrap"><canvas id="chart-sainyuu"></canvas></div></div>
      </div>
      <div id="card-chart-zei" class="card">
        <div class="card-header">市町村税の状況</div>
        <div class="card-body"><div class="chart-wrap"><canvas id="chart-zei"></canvas></div></div>
      </div>
    </div>
  `;

      const revStatData = revStats(d)
      const ogRevStatData = ogRevStats(d)
      html += `
    <div id="row-tables-rev-stat" class="charts-row">
        ${renderTableData(revStatData)}
        ${renderTableData(ogRevStatData)}
    </div>
  `;

      const localTaxRev = localTaxRevStats(d)
      const localTaxRevChoka = localTaxRevChokaStats(d)
      html += `
    <div id="row-tables-sainyuu-zei" class="charts-row">
        ${renderTableData(localTaxRev)}
        ${renderTableData(localTaxRevChoka)}
    </div>
  `;

      container.innerHTML = html;

      chartSainyuFunc()
      chartZeiFunc()
    }

    // ══════════════════════════════════════════════
    // CHART: 歳入
    // ══════════════════════════════════════════════
    const BLOOMBERG_COLORS = [
      "#fb8b1e", // amber (primary)
      "#4af6c3", // cyan/teal
      "#0068ff", // blue
      "#ff433d", // red
      "#fda04a", // amber light
      "#00aaff", // light blue
      "#ff8c69", // salmon
      "#2ecc71", // green
      "#a29bfe", // purple
      "#fdcb6e", // yellow
      "#74b9ff", // sky blue
      "#fd79a8", // pink
      "#55efc4", // mint
      "#e17055", // terra
      "#6c5ce7", // violet
    ];


    // itemList: {value: number, name: string}[]
    function renderPieChart(canvasId, itemList) {
      const labels = [], values = [], colors = [];
      itemList.forEach((item, i) => {
        const v = parseFloat(item.col1val);
        if (!isNaN(v) && v > 0) {
          labels.push(item.name);
          values.push(v);
          colors.push(BLOOMBERG_COLORS[i % BLOOMBERG_COLORS.length]);
        }
      });

      const ctx = document.getElementById(canvasId).getContext("2d");
      chartInstances[canvasId] = new Chart(ctx, {
        type: "doughnut",
        data: {
          labels,
          datasets: [{ data: values, backgroundColor: colors, borderColor: "#0a0a0a", borderWidth: 2 }],
        },
        options: {
          responsive: true,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: (ctx) => {
                  const val = ctx.raw;
                  const total = ctx.dataset.data.reduce((a, b) => a + b, 0);
                  const pct = ((val / total) * 100).toFixed(2);
                  return ` ${(val / 100000).toFixed(1)}億円 (${pct}%)`;
                },
              },
              backgroundColor: "#1a1a1a",
              borderColor: "#ff6600",
              borderWidth: 1,
              titleColor: "#ff8833",
              bodyColor: "#e8e8e8",
            },
          },
          cutout: "55%",
        },
      });
    }

    // ══════════════════════════════════════════════
    // INIT
    // ══════════════════════════════════════════════
    loadData();

    // ブラウザの戻る/進むに対応
    // ※ popstate 内では pushState/replaceState を呼ばない（ループ防止）
    window.addEventListener("popstate", () => {
      const params = new URLSearchParams(window.location.search);
      const tab = params.get("tab");
      const code = params.get("code");
      const searchText = params.get("search-text");
      console.log(tab, code, searchText);

      // 検索テキストを復元（filterCards の URL 更新は replaceState なので安全）
      document.getElementById("cb-search").value = searchText || "";
      filterCards();

      if (tab === 'search') {
        switchTab('search')
        return;
      }

      if (code) {
        const idx = allData.findIndex((d) => String(d["団体コード"]) === code);
        if (idx !== -1) {
          // selectEntity は pushState を含むため直接 UI 復元する
          activeIndex = idx;
          activateDetail();
          renderDetail(allData[idx], document.getElementById("detail"));
          switchTab('detail');
        } else {
          switchTab('search');
        }
      } else {
        activeIndex = null;
        const tabId = TAB_ID[params.get("tab")] ?? 'search';
        switchTab(tabId);
      }
    });
  </script>
</body>

</html>
