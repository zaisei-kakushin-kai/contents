    // Fetch both JSON files
    async function loadData() {
      isDataLoadingFinished = false
      const urlPrefix = "https://raw.githubusercontent.com/zaisei-kakushin-kai/contents/refs/heads/main/data/kessan_card/"
      const prom = Promise.all([
        fetch(urlPrefix + "entity-grid-akaji.json"),
        fetch(urlPrefix + "entity-grid-husaisan.json"),
        fetch(urlPrefix + "entity-grid-choka.json"),
        fetch(urlPrefix + "entity-grid-husaisanchok.jsona")
      ]).then(async (e) => {
        const akaji = await e[0].json()
        const husaisan = await e[1].json()
        const choka = await e[2].json()
        const husaisanchok = await e[3].json()
        topics = {
          akaji,
          husaisan,
          choka,
          husaisanchok
        }
      })


      const [_prefArray, response] = await Promise.all([
        fetch("https://raw.githubusercontent.com/zaisei-kakushin-kai/contents/refs/heads/main/data/kessan_card/pref2num.json").then(e => e.json()),
        fetch("https://raw.githubusercontent.com/zaisei-kakushin-kai/contents/refs/heads/main/data/kessan_card/r5_kessan_data.msgpack").then(e => e.blob())
      ])
      prefNameArray = _prefArray

      const out = await msgpack.decode(await response.bytes())

      header = Object.keys(out)
      for (let i = 0; i < out['団体名'].length; i++) {
        const m = {}
        for (const key in out) {
          Object.assign(m, { [key]: out[key][i] })
        }
        Object.assign(m, { id: `${m['都道府県コード']}-${m['団体コード']}` })

        Object.assign(m, { "都道府県名": prefNameArray[m['都道府県コード'] - 1] })
        // build all data
        allData.push(m)

        // setup per pref data
        const cardItem = buildCardItem(m, allData.length)
        Object.assign(m, { cardItem })
        if (!itemByPerf[cardItem.pref]) {
          itemByPerf[cardItem.pref] = []
        }
        itemByPerf[cardItem.pref].push(cardItem)
      }

      for (const key in itemByPerf) {
        itemByPerf[key].sort((a, b) => a['団体コード'] > b['団体コード'])
      }

      allData.sort((a, b) => {
        return a['都道府県コード'] > b['都道府県コード'] & a['団体コード'] > b['団体コード']
      })

      const params = new URLSearchParams(window.location.search)
      const id = params.get("id");
      const tab = params.get("tab");
      const search = params.get("search");

      if (!selectEntity(id)) {
        showCardBrowser();
        applySearchVisibility(search || 'search');

      renderCards()

      let _handle;
      _handle = setInterval(() => {
        if (isDataLoadingFinished) {
          document.getElementById('loading-overlay').style.display = 'none'
          clearInterval(_handle)
        }
      })
      await prom
      handleRouteChange()
    }

    // table base
    function createTableAbsAndPct(id, title, prefix, absColName, pctColName, d) {
      function fmt(n) {
        if (null == n) {
          return "-"
        }

        if (Number.isFinite(n)) {
          return n.toLocaleString()
        }

      }

      function fmtPercentage(n) {
        if (null == n) {
          return "-"
        }

        if (Number.isFinite(n)) {
          return `${n.toFixed(1)} %`
        }

      }

      const set = new Set()

      const rows = header.map((e) => {
        if (!e.startsWith(prefix)) {
          return
        }

        const list = e.split(".")
        const coreList = list.slice(1, list.length - 1)

        const core = coreList.join(".")
        if (set.has(core)) {
          return
        }

        set.add(core)

        const name = list[list.length - 2]
        const col1key = [prefix, core, absColName].join(".")
        const col2key = [prefix, core, pctColName].join(".")

        return {
          name,
          value: d[col1key],
          col1val: fmt(d[col1key]),
          col2val: fmtPercentage(d[col2key]),
          depth: list.length - 4,
          isTotal: name.includes('合計'),
        }
      }).filter(e => e)
      console.log(rows)
      return {
        id,
        title,
        header: [
          { name: '項目', key: 'name' },
          { name: absColName, key: 'col1val' },
          { name: '構成比', key: 'col2val' },
        ],
        rows: rows.slice(0, rows.length - 2),
        footerRow: { ...rows[rows.length - 1], name: absColName + ' 合計' }
      }
    }

      let count = 0
      if (!key) {

      for (let i = 0; i < key.length; i++) {

      }

      if (key.endsWith("合計") || key.includes("内訳")) {
        count -= 1;
      }

      return count;
    }

    function compareYear5andYear4(prefixes, title, d) {
      function showDelta(prefix, name, core, depth) {
        const year5 = `${prefix}.${core}.令和5年度`
        const year4 = `${prefix}.${core}.令和4年度`
        return {
          name,
          year5,
          year4,
          changeDiff: parseFloat(d[year5] / d[year4]).toFixed(2),
          depth
        }
      }

      const set = new Set()
      return {
        title,
        unit: '千円',
        header: [
          { name: '項目', key: 'name' },
          { name: '令和5年度', key: 'year5' },

        ],
        rows: header.filter(e => {
          if (!prefixes.every(prefix => prefix.startsWith(e))) {
            return
          }

          const list = e.split(".").slice(0, list.length - 2)
          const prefix_ = list[0]
          const core = list.join(".")
          if (set.has(core)) {
            return
          }

          set.add(core)

          const cat = list[list.length - 1]
          const name = cat.slice(0, cat.indexOf('_'))
          return showDelta(prefix_, name, core, list.length - 3)
        }).filter(e => e)
      }
    }

    /**
     * renderDelta(cur, prev, unit)
     *   cur, prev : number | null
     *   unit      : string  例) "人", "千円", "%"
     *   戻り値    : delta UI の HTML 文字列（kpi-valueの下に添える）
     *
     *   表示例:  ▲ +1,234人 (+2.1%)  /  ▼ −567人 (−0.3%)  /  — 変化なし
     */
    function renderDelta(cur, prev, unit = "", prevLabel = "前年") {
      if (cur === null || prev === null) return "";
      const diff = cur - prev;
      const dir = diff > 0 ? "up" : diff < 0 ? "down" : "flat";
      const arrow = diff > 0 ? "▲" : diff < 0 ? "▼" : "—";
      const sign = diff > 0 ? "+" : diff < 0 ? "−" : "";
      const absDiff = Math.abs(diff);
      const pct = prev !== 0 ? (absDiff / Math.abs(prev) * 100).toFixed(1) : null;
      const pctStr = pct !== null ? ` (${sign}${pct}%)` : "";
      const diffStr = diff !== 0
        ? `<div class="kpi-delta ${dir}">${arrow} ${sign}${absDiff.toLocaleString()}${unit}<br><span style="padding-left:1em;opacity:0.85">(${sign}${pct}%)</span></div>`
        : `<div class="kpi-delta flat">— 変化なし</div>`;
      return `<div class="kpi-prev"><span class="kpi-prev-label">${prevLabel}&nbsp;</span><span class="kpi-prev-val">${prev.toLocaleString()}${unit}</span></div>${diffStr}`;
    }

    /**
     * renderKpiGrid({ title?, id?, items })
     *   items: { label: string, value: string, suffix?: string, valueStyle?: string, delta?: string }[]
     *   title なしの場合は .card ラッパーなしで .kpi-grid のみ返す
     */
    function renderKpiGrid({ title, id, items }) {
      const cells = items.map(({ label, value, suffix, valueStyle, delta }) => `
        <div class="kpi-cell">
          <div class="kpi-label">${label}</div>
          <div class="kpi-value"${valueStyle ? ` style="${valueStyle}"` : ""}>${value}${suffix ? `<span class="kpi-unit">${suffix}</span>` : ""}</div>
          ${delta ?? ""}
        </div>`).join("");
      const grid = `<div${id ? ` id="${id}"` : ""} class="kpi-grid">${cells}</div>`;
      return title
        ? `<div class="card"><div class="card-header">${title}</div>${grid}</div>`
        : grid;
    }

    function renderBooleanData({ title, items }) {
      const cells = items.map(({ label, value }) => {
        const s = value ? "on" : "off";
        return `<div class="bool-item"><div class="bool-dot ${s}"></div><span class="bool-label ${s}">${label}</span></div>`;
      }).join("");
      return `<div class="card"><div class="card-header">${title}</div><div class="bool-grid">${cells}</div></div>`;
    }

      if (footerRow['value'] === '-') {

        ? `<tfoot><tr class="total-row">${header.map((h) => `<td>${footerRow[h.key]}</td>`).join("")}</tr></tfoot>`
        : "";
      const bodyRows = rows.map((row) => {
        const emPerDepth = [
          0.8,

          3.2,
          4.6,
        ]
        const indentPx = `${emPerDepth[row.depth] ?? 0}em`
        const trClass = row.isTotal ? ` class="total-row"` : "";
        const tdCells = header.map((header, i) => {
          let cell = row[header.key]
          const styles = [];
          if (i === 0) styles.push(`padding-left:${indentPx}`, "color:var(--white)");
          if (row.dim && i === 0 && row.depth === 0) styles.push("color:var(--white)");
          if (i > 0) styles.push("text-align:right");
          if (row.highlight && i === row.highlightCol) styles.push("color:var(--orange)");
          const style = styles.length ? ` style="${styles.join(";")}"` : "";

          return `<td${style}>${cell}</td>`;
        }).join("\n");
        return `<tr${trClass}>${tdCells}</tr>`;
      }).join("\n");

      const colgroup = `<colgroup>
        <col style="max-width:70%">
        <col style="width:12em">
        <col style="width:5em">
      </colgroup>`;

      return `

      let html = `

        <div id="entity-header">
          <div>
            <div id="entity-name">${d["都道府県名"]} ${d["団体名"]}</div>

      html += `

        <div id="card-chart-sainyuu" class="card">
          <div class="card-header">歳入の状況・円グラフ</div>
          <div class="card-body chart-card-body">

      html += renderTableData(localTaxRevIppan)
      html += `
      <div id="card-chart-${localTaxRevIppan.id}" class="card">

      container.innerHTML = html;

      function chartSainyu() {
        const itemList = revStats(d).rows
          .filter(e => !e.key.includes('.') && e.value !== '-')
          .filter(e => parseFloat(e.ratio) > 1)
          .map(e => ({
            name: e.name,
            value: e.rawValue,
            ratio: parseFloat(e.ratio)
          }))
        return {
          itemList,

      renderPieChart('chart-sainyuu', chartSainyu())

      function chartLocalTax() {
        const itemList = localTaxRevStats(d).rows
          .filter(e => !e.name.includes('合計') || e.name == "固定資産税")
          .map(e => {

            if (e.name.startsWith("うち純固定資産税")) {

            }
            return {

        return {

      function chartChokaInKeiJyo() {

          .filter(e => !e.name.includes('合計'))
          .filter(e => !e.name.startsWith("固定資産税"))
          .map(e => {

            if (e.name.startsWith("うち純固定資産税")) {
              name = "純固定資産税"
            }
            return {
              name,

    }

    // ══════════════════════════════════════════════
    // CHART: 歳入
    // ══════════════════════════════════════════════
    const BLOOMBERG_COLORS = [
      "#fb8b1e", // amber (primary)
      "#4af6c3", // cyan/teal
      "#0068ff", // blue
      "#ff433d", // red
      "#fda04a", // amber light
      "#00aaff", // light blue
      "#ff8c69", // salmon
      "#2ecc71", // green
      "#a29bfe", // purple
      "#fdcb6e", // yellow
      "#74b9ff", // sky blue
      "#fd79a8", // pink
      "#55efc4", // mint
      "#e17055", // terra
      "#6c5ce7", // violet
    ];


    function renderPieChart(canvasId, dataset) {
      const total = dataset.total
      let remainder = dataset.total
      for (const item of dataset.itemList) {
        if (!Number.isFinite(item.value)) { continue }
        remainder -= item.value
      }

      const itemList = [{ value: remainder, ratio: (remainder / dataset.total) * 100, name: dataset.remainderName ?? 'その他', isLast: true, color: '#696969' }]
      dataset.itemList.forEach(e => itemList.push(e))
      itemList.sort((a, b) => a.isLast)

      itemList.forEach((item, i) => {
        if (!item['color']) {
          item["color"] = BLOOMBERG_COLORS[i % BLOOMBERG_COLORS.length];
        }
      });

      const legendEl = document.getElementById(`${canvasId}-legend`);
      if (legendEl) {
        const createText = (item) => `
          <span>${fmt1000ennToKansuji(item.value)}</span>
          <span>/</span>
          <span>${fmtPercentage(item.ratio)}</span>
        `
        const emptyValue = "-"
        legendEl.innerHTML = itemList.map((item, idx) => `
          <div class="chart-legend-item">
            <span class="chart-legend-dot" style="background:${item.color}"></span>
            <span class="chart-legend-label">
              ${item.name}
            </span>
            <span class="chart-legend-value">
              ${Number.isFinite(item.value) ? createText(item) : emptyValue}
            </span>
          </div>`).join("");
      }

      const el = document.getElementById(canvasId);
      const finiteItemList = itemList.filter(e => e.value !== '-');
      const chart = echarts.init(el);
      chartInstances[canvasId] = chart;
      chart.setOption({
        textStyle: { fontFamily: '"Noto Sans JP", sans-serif' },
        tooltip: {
          trigger: 'item',
          backgroundColor: '#1a1a1a',
          borderColor: '#ff6600',
          borderWidth: 1,
          textStyle: { color: '#e8e8e8', fontFamily: '"Noto Sans JP", sans-serif' },
          appendToBody: true,
          extraCssText: 'z-index: 9999;',
          formatter: (params) => {
            const pct = ((params.value / total) * 100).toFixed(2);
            return `${params.name}<br/>${(params.value / 10000).toFixed(1)}億円 (${pct}%)`;
          },
        },
        series: [{
          type: 'pie',
          radius: ['55%', '80%'],
          data: finiteItemList.map(e => ({
            value: e.value,
            name: e.name,
            itemStyle: { color: e.color, borderColor: '#0a0a0a', borderWidth: 0.5 },
            emphasis: { itemStyle: { borderColor: '#ffffff', borderWidth: 1 } },
          })),
          label: { show: false },
        }],
      });

    }

    // ══════════════════════════════════════════════
    // INIT

    loadData();

      const currentURL = window.location
      const searchParams = new URLSearchParams(currentURL.search)
      selectEntity(searchParams.get("id"))
    }

    // pushState をラップしてカスタムイベントを発火
    // popstate（ブラウザの戻る/進む）も同じイベントに統一
    window.addEventListener('popstate', () => {
      window.dispatchEvent(new Event('routechange'))
    })

    window.addEventListener('routechange', handleRouteChange)
  </script>
