<style>
:root {
  --bg:#f7f8fa;--surface:#fff;--border:#e0e3ea;--border-lt:#edf0f5;
  --text:#1a1e2c;--text-dim:#6b7489;--accent:#0e7490;--accent-lt:rgba(14,116,144,.08);
  --kyokai:#2563eb;--kumiai:#059669;--kyosai:#7c3aed;--kokuho:#d97706;--kouki:#dc2626;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh}
.container{max-width:1480px;margin:0 auto;padding:32px 28px 56px}

header{margin-bottom:28px;padding-bottom:20px;border-bottom:2px solid var(--border)}
.tag{display:inline-block;font-family:'DM Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);background:var(--accent-lt);border:1px solid rgba(14,116,144,.18);border-radius:4px;padding:3px 9px;margin-bottom:10px}
h1{font-size:clamp(20px,2.8vw,34px);font-weight:900;letter-spacing:-.02em;line-height:1.2;margin-bottom:4px}
h1 span{color:var(--accent)}
.subtitle{font-size:12px;color:var(--text-dim);font-weight:300}

/* Sheet tabs */
.sheet-tabs{display:flex;gap:0;margin-bottom:24px;border-bottom:2px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch}
.sheet-tabs::-webkit-scrollbar{height:3px}
.sheet-tabs::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.sheet-tab{font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:500;padding:10px 18px;border:none;background:none;color:var(--text-dim);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s}
.sheet-tab:hover{color:var(--text);background:var(--accent-lt)}
.sheet-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:9px;margin-bottom:18px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:14px 16px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
.stat-label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.stat-value{font-family:'DM Mono',monospace;font-size:20px;font-weight:500}
.stat-unit{font-size:11px;color:var(--text-dim);font-weight:300;margin-left:2px}

/* View controls */
.controls{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px}
.controls button{font-family:'DM Mono',monospace;font-size:11px;padding:6px 13px;border-radius:5px;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);cursor:pointer;transition:all .15s}
.controls button:hover{border-color:#9ca3b4;color:var(--text)}
.controls button.active{border-color:var(--accent);color:var(--accent);background:var(--accent-lt);font-weight:500}

/* Charts */
.chart-wrapper{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:22px 18px 14px;margin-bottom:18px;box-shadow:0 1px 3px rgba(0,0,0,.03)}
.chart-title{font-size:12px;font-weight:600;letter-spacing:.02em;margin-bottom:12px}
.chart-container{position:relative;height:380px;width:100%}

.legend-bar{display:flex;gap:14px;flex-wrap:wrap;padding:12px 18px;background:var(--surface);border:1px solid var(--border);border-radius:9px;margin-bottom:18px;box-shadow:0 1px 2px rgba(0,0,0,.02)}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-dim)}
.legend-dot{width:8px;height:8px;border-radius:2px}

.dual-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}

.footer-note{font-size:10px;color:var(--text-dim);line-height:1.7;border-top:2px solid var(--border);padding-top:16px;margin-top:6px}

@media(max-width:900px){.dual-grid{grid-template-columns:1fr}.container{padding:18px 12px 36px}.chart-container{height:280px}.sheet-tab{padding:8px 12px;font-size:11px}}
</style>
</head>

const SHEET_KEYS = Object.keys(ALL_DATA);
const COLORS={kyokai:'#2563eb',kumiai:'#059669',kyosai:'#7c3aed',kokuho:'#d97706',kouki:'#dc2626'};
const NAMES={a:'協会けんぽ',b:'組合健保',c:'共済組合',d:'国民健康保険',e:'後期高齢者医療'};
const K=['a','b','c','d','e'];

function fmt(n){
  if(n>=1e9)return(n/1e9).toFixed(1)+'B';
  if(n>=1e6)return(n/1e6).toFixed(1)+'M';
  if(n>=1e3)return(n/1e3).toFixed(0)+'k';
  return n.toLocaleString();
}

Chart.defaults.color='#6b7489';
Chart.defaults.borderColor='#e0e3ea';
Chart.defaults.font.family="'DM Mono','Noto Sans JP',monospace";
Chart.defaults.font.size=10;

const TT={backgroundColor:'#fff',borderColor:'#e0e3ea',borderWidth:1,titleColor:'#1a1e2c',bodyColor:'#6b7489',titleFont:{weight:'600',size:11},bodyFont:{size:10},padding:10,cornerRadius:7};
const GC='#edf0f5';

let mainChart,stackedChart,cdfChart;
let currentSheet=SHEET_KEYS[0];
let currentView='total';

// Build sheet tabs
const tabsEl=document.getElementById('sheetTabs');
SHEET_KEYS.forEach(key=>{
  const btn=document.createElement('button');
  btn.className='sheet-tab';
  btn.textContent=key;
  btn.dataset.sheet=key;
  tabsEl.appendChild(btn);
});

tabsEl.addEventListener('click',e=>{
  const btn=e.target.closest('.sheet-tab');
  if(!btn)return;
  currentSheet=btn.dataset.sheet;
  currentView='total';
  render();
});

// View controls
const ctrlEl=document.getElementById('viewControls');
const VIEWS=[
  {id:'total',label:'制度・計（全体）'},
  {id:'breakdown',label:'制度別 内訳'},
  {id:'kouki',label:'後期高齢者 vs その他'},
  {id:'log',label:'対数スケール'},
];
VIEWS.forEach(v=>{
  const btn=document.createElement('button');
  btn.textContent=v.label;
  btn.dataset.view=v.id;
  ctrlEl.appendChild(btn);
});
ctrlEl.addEventListener('click',e=>{
  const btn=e.target.closest('button');
  if(!btn)return;
  currentView=btn.dataset.view;
  render();
});

function render(){
  const data=ALL_DATA[currentSheet];
  const labels=data.map(d=>d.l);
  const totals=data.map(d=>d.t);
  const totalSum=totals.reduce((a,b)=>a+b,0);
  const koukiSum=data.reduce((s,d)=>s+d.e,0);
  const peak=data.reduce((a,b)=>b.t>a.t?b:a);

  // Unit for food/living sheets
  const isYen=currentSheet.includes('食事')|| currentSheet.includes('金額');
  const unit=isYen?'円':'点';

  // Tabs
  tabsEl.querySelectorAll('.sheet-tab').forEach(b=>{
    b.classList.toggle('active',b.dataset.sheet===currentSheet);
  });
  // View btns
  ctrlEl.querySelectorAll('button').forEach(b=>{
    b.classList.toggle('active',b.dataset.view===currentView);
  });

  // Stats
  document.getElementById('statsGrid').innerHTML=`
    <div class="stat-card"><div class="stat-label">総件数（制度・計）</div><div class="stat-value">${fmt(totalSum)}<span class="stat-unit">件</span></div></div>
    <div class="stat-card"><div class="stat-label">後期高齢者 件数</div><div class="stat-value">${fmt(koukiSum)}<span class="stat-unit">件</span></div></div>
    <div class="stat-card"><div class="stat-label">最頻値帯</div><div class="stat-value" style="font-size:14px">${peak.l}<span class="stat-unit">${unit}</span></div></div>
    <div class="stat-card"><div class="stat-label">階級数</div><div class="stat-value">${data.length}<span class="stat-unit">区間</span></div></div>
  `;

  // Main chart
  if(mainChart)mainChart.destroy();
  const titleEl=document.getElementById('chartTitle');
  const legendEl=document.getElementById('legendBar');
  let datasets=[],yLog=false;
  const cK={a:'kyokai',b:'kumiai',c:'kyosai',d:'kokuho',e:'kouki'};

  if(currentView==='total'){
    titleEl.textContent=`${currentSheet} — 全制度合計 件数分布`;
    datasets=[{label:'制度・計',data:totals,backgroundColor:'rgba(14,116,144,.6)',borderColor:'#0e7490',borderWidth:1.5,borderRadius:3}];
    legendEl.innerHTML=`<div class="legend-item"><div class="legend-dot" style="background:#0e7490"></div>制度・計</div>`;
  }else if(currentView==='breakdown'){
    titleEl.textContent=`${currentSheet} — 制度別 内訳`;
    datasets=K.map(k=>({label:NAMES[k],data:data.map(d=>d[k]),backgroundColor:COLORS[cK[k]]+'aa',borderColor:COLORS[cK[k]],borderWidth:1,borderRadius:2}));
    legendEl.innerHTML=K.map(k=>`<div class="legend-item"><div class="legend-dot" style="background:${COLORS[cK[k]]}"></div>${NAMES[k]}</div>`).join('');
  }else if(currentView==='kouki'){
    titleEl.textContent=`${currentSheet} — 後期高齢者 vs その他`;
    datasets=[
      {label:'後期高齢者医療',data:data.map(d=>d.e),backgroundColor:'rgba(220,38,38,.55)',borderColor:'#dc2626',borderWidth:1,borderRadius:3},
      {label:'その他（制度・計）',data:totals,backgroundColor:'rgba(37,99,235,.4)',borderColor:'#2563eb',borderWidth:1,borderRadius:3}
    ];
    legendEl.innerHTML=`<div class="legend-item"><div class="legend-dot" style="background:#dc2626"></div>後期高齢者医療</div><div class="legend-item"><div class="legend-dot" style="background:#2563eb"></div>その他（制度・計）</div>`;
  }else if(currentView==='log'){
    titleEl.textContent=`${currentSheet} — 対数スケール`;
    yLog=true;
    datasets=[{label:'制度・計',data:totals,backgroundColor:'rgba(124,58,237,.45)',borderColor:'#7c3aed',borderWidth:1.5,borderRadius:3}];
    legendEl.innerHTML=`<div class="legend-item"><div class="legend-dot" style="background:#7c3aed"></div>制度・計（対数）</div>`;
  }

  mainChart=new Chart(document.getElementById('mainChart'),{
    type:'bar',data:{labels,datasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},tooltip:{...TT,callbacks:{label:c=>`${c.dataset.label}: ${c.raw.toLocaleString()} 件`}}},
      scales:{
        x:{grid:{display:false},ticks:{maxRotation:65,minRotation:45,font:{size:8},autoSkip:true,maxTicksLimit:26}},
        y:{type:yLog?'logarithmic':'linear',grid:{color:GC},ticks:{callback:v=>fmt(v),font:{size:9}},title:{display:true,text:'件数',font:{size:10},color:'#6b7489'}}
      },
      animation:{duration:450,easing:'easeOutQuart'}
    }
  });

  // Stacked
  if(stackedChart)stackedChart.destroy();
  const stacked=data.map(d=>{
    const sum=K.reduce((s,k)=>s+d[k],0);
    return K.reduce((o,k)=>{o[k]=sum?(d[k]/sum)*100:0;return o},{});
  });
  stackedChart=new Chart(document.getElementById('stackedChart'),{
    type:'bar',
    data:{labels,datasets:K.map(k=>({label:NAMES[k],data:stacked.map(d=>d[k]),backgroundColor:COLORS[cK[k]]+'bb',borderColor:COLORS[cK[k]],borderWidth:.5}))},
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{position:'bottom',labels:{boxWidth:8,boxHeight:8,padding:10,font:{size:9}}},tooltip:{...TT,callbacks:{label:c=>`${c.dataset.label}: ${c.raw.toFixed(1)}%`}}},
      scales:{
        x:{stacked:true,grid:{display:false},ticks:{maxRotation:65,minRotation:45,font:{size:7},autoSkip:true,maxTicksLimit:20}},
        y:{stacked:true,max:100,grid:{color:GC},ticks:{callback:v=>v+'%',font:{size:9}}}
      },
      animation:{duration:450,easing:'easeOutQuart'}
    }
  });

  // CDF
  if(cdfChart)cdfChart.destroy();
  const cdf=[];let cum=0;
  totals.forEach(v=>{cum+=v;cdf.push((cum/totalSum)*100)});
  cdfChart=new Chart(document.getElementById('cdfChart'),{
    type:'line',
    data:{labels,datasets:[{label:'累積比率',data:cdf,borderColor:'#0e7490',backgroundColor:'rgba(14,116,144,.06)',borderWidth:2.5,fill:true,pointRadius:0,pointHoverRadius:4,pointHoverBackgroundColor:'#0e7490',tension:.3}]},
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},tooltip:{...TT,callbacks:{label:c=>`累積: ${c.raw.toFixed(1)}%`}}},
      scales:{
        x:{grid:{display:false},ticks:{maxRotation:65,minRotation:45,font:{size:7},autoSkip:true,maxTicksLimit:18}},
        y:{max:100,grid:{color:GC},ticks:{callback:v=>v+'%',font:{size:9}},title:{display:true,text:'累積比率',font:{size:10},color:'#6b7489'}}
      },
      animation:{duration:600,easing:'easeOutQuart'}
    }
  });
}

render();
</script>
